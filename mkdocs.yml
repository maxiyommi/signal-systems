site_name: "Señales y Sistemas — UNTREF"
site_url: https://maxiyommi.github.io/signal-systems/
site_description: "Material práctico de Señales y Sistemas — Ingeniería de Sonido — UNTREF"
repo_url: https://github.com/maxiyommi/signal-systems
repo_name: maxiyommi/signal-systems

theme:
  name: material
  language: es
  custom_dir: docs/overrides
  logo: LogoPractica.png
  favicon: LogoPractica.png
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.tabs
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/maxiyommi/signal-systems
      name: Repositorio del curso
    - icon: fontawesome/brands/slack
      link: https://senalesysistemas.slack.com
      name: Slack del curso

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Inicio: index.md
  - Cronograma: cronograma.md
  - Clases: clases/README.md
  - Trabajo Práctico:
      - Consigna: trabajo_practico/README.md
      - Rúbrica: trabajo_practico/rubrica.md
      - Milestones:
          - "M0 — Arquitectura": trabajo_practico/especificacion/m0_arquitectura.md
          - "M1 — Generación": trabajo_practico/especificacion/m1_generacion.md
          - "M2 — Procesamiento": trabajo_practico/especificacion/m2_procesamiento.md
          - "M3 — Producto Final": trabajo_practico/especificacion/m3_producto_final.md
  - Guías:
      - Setup del Entorno: guias/setup_entorno.md
      - Git Básico: guias/git_basico.md
      - Marimo: guias/marimo_intro.md
      - "Quarto (Informes)": guias/quarto_informe.md
  - Reglas Slack: reglas_slack.md

plugins:
  - search:
      lang: es

hooks:
  - hooks/extras_nav.py

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
